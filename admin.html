<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ticket Admin</title>
  
  <!-- Client-side QR generation, ZIP creation, and Download libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: #1a1a1a;
      padding: 16px 24px;
      border-bottom: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
    }

    .stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #aaa;
    }

    .stat span {
      color: #fff;
      font-weight: 700;
    }

    /* Key screen */
    #key-screen {
      max-width: 400px;
      margin: 80px auto;
      padding: 40px 24px;
      background: #1a1a1a;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      text-align: center;
    }

    #key-screen h2 {
      font-size: 22px;
    }

    #key-screen p {
      color: #888;
      font-size: 14px;
    }

    .key-input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 2px solid #333;
      background: #111;
      color: #fff;
      font-size: 18px;
      text-align: center;
      letter-spacing: 3px;
    }

    .key-input.error {
      border-color: #ef4444;
      animation: shake 0.3s ease;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      25% {
        transform: translateX(-8px);
      }

      75% {
        transform: translateX(8px);
      }
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      transition: opacity 0.2s;
    }

    .btn:active {
      opacity: 0.8;
    }

    .btn-blue {
      background: #3b82f6;
      color: #fff;
    }

    .btn-green {
      background: #16a34a;
      color: #fff;
    }

    .btn-red {
      background: #dc2626;
      color: #fff;
    }

    .btn-gray {
      background: #333;
      color: #aaa;
    }

    #key-error {
      color: #ef4444;
      font-size: 13px;
      display: none;
    }

    /* Main content */
    #main {
      display: none;
      padding: 20px 24px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }

    #search {
      flex: 1;
      min-width: 200px;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
    }

    select {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #fff;
      font-size: 14px;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      background: #1a1a1a;
      padding: 12px 10px;
      text-align: left;
      color: #888;
      font-weight: 600;
      border-bottom: 2px solid #333;
      white-space: nowrap;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #222;
      vertical-align: middle;
    }

    tr:hover td {
      background: #161616;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    .badge-valid {
      background: #14532d;
      color: #86efac;
    }

    .badge-scanned {
      background: #431407;
      color: #fdba74;
    }

    .badge-sent {
      background: #1e3a5f;
      color: #93c5fd;
    }

    .badge-unsent {
      background: #222;
      color: #666;
    }

    .email-input {
      padding: 7px 10px;
      border-radius: 7px;
      border: 1px solid #333;
      background: #111;
      color: #fff;
      font-size: 13px;
      width: 220px;
    }

    .email-input:focus {
      outline: none;
      border-color: #3b82f6;
    }

    .save-btn {
      padding: 7px 14px;
      border: none;
      border-radius: 7px;
      background: #3b82f6;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }

    .save-btn:disabled {
      background: #333;
      color: #555;
      cursor: default;
    }

    .save-btn.saved {
      background: #16a34a;
    }

    #loading {
      text-align: center;
      padding: 60px;
      color: #666;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>

<body>

  <!-- Key gate -->
  <div id="key-screen">
    <h2>🔐 Admin Access</h2>
    <p>Enter the access key to manage tickets.</p>
    <input id="key-input" class="key-input" type="password" placeholder="••••••••••"
      onkeydown="if(event.key==='Enter') verifyKey()" />
    <p id="key-error">Incorrect key. Try again.</p>
    <button class="btn btn-blue" onclick="verifyKey()">Enter</button>
  </div>

  <!-- Main admin panel -->
  <div id="main">
    <header>
      <h1>🎟️ Ticket Admin</h1>
      <div class="stats">
        <div>Total: <span id="stat-total">—</span></div>
        <div>Scanned: <span id="stat-scanned">—</span></div>
        <div>Emails assigned: <span id="stat-emails">—</span></div>
        <div>Emails sent: <span id="stat-sent">—</span></div>
      </div>
    </header>

    <div id="main-content" style="padding: 20px 24px;">
      <div class="toolbar">
        <input id="search" type="text" placeholder="Search ticket ID or email..." oninput="renderTable()" />
        <select id="filter" onchange="renderTable()">
          <option value="all">All tickets</option>
          <option value="valid">Valid only</option>
          <option value="scanned">Scanned only</option>
          <option value="no-email">No email assigned</option>
          <option value="email-sent">Email sent</option>
          <option value="email-unsent">Email assigned, not sent</option>
        </select>
        <button class="btn btn-blue" onclick="loadTickets()">↻ Refresh</button>
        <button class="btn btn-blue" id="bulk-email-btn" onclick="bulkSendEmails()">✉ Send Unsent Emails</button>
      </div>

      <!-- Ticket Generator & ZIP/Excel Download Card -->
      <div class="toolbar" style="margin-top: -8px; margin-bottom: 20px; background: #1a1a1a; padding: 16px; border-radius: 12px; border: 1px solid #333; display: block;">
        <div style="font-weight: bold; font-size: 14px; margin-bottom: 8px; color: #3b82f6;">🎫 Generate Fresh Tickets & QR Codes</div>
        <div style="display: flex; gap: 12px; align-items: center; width: 100%; flex-wrap: wrap;">
          <input id="gen-count" type="number" placeholder="Count (e.g. 150)" min="1" max="1500" class="email-input" style="width: 140px; background: #111;" />
          <button class="btn btn-green" id="gen-btn" onclick="generateTickets()">Generate & Download ZIP</button>
          <div id="gen-progress" style="font-size: 13px; color: #aaa; font-weight: bold; margin-left: 8px;"></div>
        </div>
      </div>

      <div class="table-wrap">
        <div id="loading">Loading tickets from Firebase...</div>
        <table id="ticket-table" style="display:none">
          <thead>
            <tr>
              <th>#</th>
              <th>Ticket ID</th>
              <th>Status</th>
              <th>Scanned By</th>
              <th>Scan Time</th>
              <th>Email</th>
              <th>Email Sent</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>

      <div class="pagination">
        <button class="btn btn-gray" onclick="prevPage()">← Prev</button>
        <span id="page-info">Page 1</span>
        <button class="btn btn-gray" onclick="nextPage()">Next →</button>
      </div>
    </div>
  </div>

  <script>
    // 🌐 Cloudflare Worker API Settings
    const API_URL = window.location.protocol === "file:" || window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
      ? "http://localhost:8787" 
      : window.location.origin;

    // 🔑 Admin access key
    const ACCESS_KEY = "Raghav@ticket";

    const PAGE_SIZE = 50;
    let allTickets = []; // [{id, status, email, scanned_by, scan_time, email_sent}, ...]
    let filtered = [];
    let currentPage = 1;

    function verifyKey() {
      const input = document.getElementById("key-input");
      if (input.value === ACCESS_KEY) {
        document.getElementById("key-screen").style.display = "none";
        document.getElementById("main").style.display = "block";
        loadTickets();
      } else {
        input.value = "";
        input.classList.add("error");
        document.getElementById("key-error").style.display = "block";
        setTimeout(() => input.classList.remove("error"), 400);
      }
    }

    async function loadTickets() {
      document.getElementById("loading").style.display = "block";
      document.getElementById("ticket-table").style.display = "none";

      try {
        const res = await fetch(`${API_URL}/api/tickets`, {
          headers: {
            "Authorization": `Bearer ${ACCESS_KEY}`
          }
        });
        const data = await res.json();

        allTickets = data ? Object.entries(data).map(([id, val]) => ({
          id,
          status: val.status || "Valid",
          email: val.email || "",
          scanned_by: val.scanned_by || "",
          scan_time: val.scan_time || "",
          email_sent: val.email_sent || false,
        })) : [];

        updateStats();
        renderTable();

        document.getElementById("loading").style.display = "none";
        document.getElementById("ticket-table").style.display = "table";
      } catch (err) {
        document.getElementById("loading").textContent = "Error loading tickets. Check backend API.";
        console.error(err);
      }
    }

    function updateStats() {
      document.getElementById("stat-total").textContent = allTickets.length;
      document.getElementById("stat-scanned").textContent = allTickets.filter(t => t.status === "Scanned").length;
      document.getElementById("stat-emails").textContent = allTickets.filter(t => t.email).length;
      document.getElementById("stat-sent").textContent = allTickets.filter(t => t.email_sent).length;
    }

    function renderTable() {
      const query = document.getElementById("search").value.toLowerCase();
      const filter = document.getElementById("filter").value;

      filtered = allTickets.filter(t => {
        const matchSearch = !query || t.id.includes(query) || t.email.toLowerCase().includes(query);
        let matchFilter = true;
        if (filter === "valid") matchFilter = t.status === "Valid";
        if (filter === "scanned") matchFilter = t.status === "Scanned";
        if (filter === "no-email") matchFilter = !t.email;
        if (filter === "email-sent") matchFilter = t.email_sent;
        if (filter === "email-unsent") matchFilter = t.email && !t.email_sent;
        return matchSearch && matchFilter;
      });

      currentPage = 1;
      renderPage();
    }

    function renderPage() {
      const start = (currentPage - 1) * PAGE_SIZE;
      const page = filtered.slice(start, start + PAGE_SIZE);
      const tbody = document.getElementById("table-body");
      tbody.innerHTML = "";

      page.forEach((t, i) => {
        const row = document.createElement("tr");
        row.innerHTML = `
        <td style="color:#555">${start + i + 1}</td>
        <td style="font-family:monospace;color:#a5f3fc">${t.id}</td>
        <td><span class="badge badge-${t.status.toLowerCase()}">${t.status}</span></td>
        <td style="color:#888">${t.scanned_by || "—"}</td>
        <td style="color:#888;font-size:12px">${t.scan_time || "—"}</td>
        <td>
          <input class="email-input" type="email" placeholder="email@example.com"
            value="${t.email}" id="email-${t.id}"
            onchange="markDirty('${t.id}')" oninput="markDirty('${t.id}')" />
        </td>
        <td>
          <span class="badge ${t.email_sent ? 'badge-sent' : 'badge-unsent'}" id="status-badge-${t.id}">
            ${t.email_sent ? "Sent ✓" : "Not sent"}
          </span>
        </td>
        <td>
          <div style="display: flex; gap: 8px;">
            <button class="save-btn" id="save-${t.id}" onclick="saveEmail('${t.id}')" disabled>Save</button>
            <button class="btn btn-blue" style="padding: 7px 12px; font-size: 13px;" id="send-${t.id}" onclick="sendTicketEmail('${t.id}')" ${t.email ? '' : 'disabled'}>Email ✉</button>
          </div>
        </td>
      `;
        tbody.appendChild(row);
      });

      const totalPages = Math.ceil(filtered.length / PAGE_SIZE) || 1;
      document.getElementById("page-info").textContent =
        `Page ${currentPage} of ${totalPages} (${filtered.length} tickets)`;
    }

    function markDirty(id) {
      const btn = document.getElementById(`save-${id}`);
      btn.disabled = false;
      btn.classList.remove("saved");
      btn.textContent = "Save";
    }

    async function saveEmail(id) {
      const emailVal = document.getElementById(`email-${id}`).value.trim();
      const btn = document.getElementById(`save-${id}`);
      const sendBtn = document.getElementById(`send-${id}`);
      btn.disabled = true;
      btn.textContent = "Saving...";

      try {
        const res = await fetch(`${API_URL}/api/save-email`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${ACCESS_KEY}`
          },
          body: JSON.stringify({ ticketId: id, email: emailVal })
        });

        if (res.ok) {
          // Update local data
          const ticket = allTickets.find(t => t.id === id);
          if (ticket) ticket.email = emailVal;

          btn.textContent = "Saved ✓";
          btn.classList.add("saved");
          if (emailVal) {
            sendBtn.removeAttribute("disabled");
          } else {
            sendBtn.setAttribute("disabled", "true");
          }
          updateStats();
        } else {
          btn.textContent = "Error";
          btn.disabled = false;
        }
      } catch (err) {
        btn.textContent = "Error";
        btn.disabled = false;
      }
    }

    async function sendTicketEmail(id) {
      const sendBtn = document.getElementById(`send-${id}`);
      const emailVal = document.getElementById(`email-${id}`).value.trim();
      const originalText = sendBtn.textContent;
      sendBtn.disabled = true;
      sendBtn.textContent = "Sending...";

      try {
        const res = await fetch(`${API_URL}/api/send-email`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${ACCESS_KEY}`
          },
          body: JSON.stringify({ ticketId: id, email: emailVal })
        });

        if (res.ok) {
          sendBtn.textContent = "Sent ✓";
          sendBtn.classList.remove("btn-blue");
          sendBtn.classList.add("btn-green");
          
          // Update local state
          const ticket = allTickets.find(t => t.id === id);
          if (ticket) ticket.email_sent = true;
          
          const statusBadge = document.getElementById(`status-badge-${id}`);
          if (statusBadge) {
            statusBadge.className = "badge badge-sent";
            statusBadge.textContent = "Sent ✓";
          }
          
          updateStats();
        } else {
          const data = await res.json();
          alert("Error sending email: " + (data.details || data.error));
          sendBtn.disabled = false;
          sendBtn.textContent = originalText;
        }
      } catch (err) {
        alert("Network error sending email.");
        sendBtn.disabled = false;
        sendBtn.textContent = originalText;
      }
    }

    // ✉ Bulk Send Unsent Emails
    async function bulkSendEmails() {
      const unsent = allTickets.filter(t => t.email && !t.email_sent);
      if (unsent.length === 0) {
        alert("No unsent tickets with assigned email addresses found.");
        return;
      }

      if (!confirm(`Are you sure you want to send emails to all ${unsent.length} pending tickets?`)) {
        return;
      }

      const bulkBtn = document.getElementById("bulk-email-btn");
      const originalText = bulkBtn.textContent;
      bulkBtn.disabled = true;

      for (let i = 0; i < unsent.length; i++) {
        const t = unsent[i];
        bulkBtn.textContent = `Sending (${i + 1}/${unsent.length})...`;
        
        try {
          const res = await fetch(`${API_URL}/api/send-email`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${ACCESS_KEY}`
            },
            body: JSON.stringify({ ticketId: t.id, email: t.email })
          });

          if (res.ok) {
            t.email_sent = true;
          }
        } catch (err) {
          console.error(`Failed to send bulk email for ${t.id}:`, err);
        }
      }

      bulkBtn.disabled = false;
      bulkBtn.textContent = originalText;
      alert("Bulk emailing completed!");
      loadTickets();
    }

    // 🎫 Dynamic Browser-side QR code generator
    function generateQRCodeBase64(text) {
      return new Promise((resolve) => {
        const div = document.createElement("div");
        const qrcode = new QRCode(div, {
          text: text,
          width: 256,
          height: 256,
          correctLevel: QRCode.CorrectLevel.H
        });
        
        // Wait a small timeout for QRCode rendering to complete
        setTimeout(() => {
          const canvas = div.querySelector("canvas");
          if (canvas) {
            resolve(canvas.toDataURL("image/png").split(",")[1]);
          } else {
            const img = div.querySelector("img");
            if (img && img.src) {
              resolve(img.src.split(",")[1]);
            } else {
              resolve("");
            }
          }
        }, 60);
      });
    }

    // 🎫 Ticket Generation and ZIP & Excel CSV mapping download
    async function generateTickets() {
      const countInput = document.getElementById("gen-count");
      const genBtn = document.getElementById("gen-btn");
      const progressEl = document.getElementById("gen-progress");
      
      const count = parseInt(countInput.value, 10);
      if (isNaN(count) || count <= 0 || count > 1500) {
        alert("Please enter a valid ticket count between 1 and 1,500.");
        return;
      }

      genBtn.disabled = true;
      countInput.disabled = true;
      progressEl.style.display = "inline-block";
      progressEl.textContent = "Creating ticket database in Firebase...";

      try {
        // 1. Call Backend Worker to generate ticket database records
        const res = await fetch(`${API_URL}/api/generate`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${ACCESS_KEY}`
          },
          body: JSON.stringify({ count: count })
        });
        
        if (!res.ok) {
          const errData = await res.json();
          alert("Error generating tickets in database: " + errData.error);
          resetGenUI();
          return;
        }

        const data = await res.json();
        const ticketIds = data.tickets; // Array of generated unique 8-character codes

        // 2. Generate QRs & ZIP package sequentially in the browser
        progressEl.textContent = "Initializing ZIP compiler...";
        const zip = new JSZip();
        
        // CSV Metadata Sheet (Excel readable)
        let csvContent = "Ticket Name,Ticket Code\r\n";

        for (let i = 0; i < ticketIds.length; i++) {
          const ticketId = ticketIds[i];
          const ticketName = `ticket_${i + 1}`;
          
          progressEl.textContent = `Rendering QRs: ${Math.round(((i + 1) / ticketIds.length) * 100)}%`;
          
          // Generate QR code base64 image data
          const base64Data = await generateQRCodeBase64(ticketId);
          if (base64Data) {
            zip.file(`${ticketName}.png`, base64Data, { base64: true });
          }
          
          // Append row mapping sequential name to Firebase unique code
          csvContent += `${ticketName},${ticketId}\r\n`;
        }

        // Add Excel CSV mapping database to the ZIP file
        zip.file("ticket_list.csv", csvContent);

        // 3. Output ZIP folder for download
        progressEl.textContent = "Compressing ZIP file...";
        const contentBlob = await zip.generateAsync({ type: "blob" });
        saveAs(contentBlob, `tickets_package_${count}.zip`);

        progressEl.textContent = "Success! Package downloaded.";
        setTimeout(resetGenUI, 3000);
        loadTickets(); // Refresh lists

      } catch (err) {
        alert("Network error generating tickets.");
        console.error(err);
        resetGenUI();
      }

      function resetGenUI() {
        genBtn.disabled = false;
        countInput.disabled = false;
        countInput.value = "";
        progressEl.textContent = "";
        progressEl.style.display = "none";
      }
    }

    function prevPage() {
      if (currentPage > 1) { currentPage--; renderPage(); }
    }

    function nextPage() {
      const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
      if (currentPage < totalPages) { currentPage++; renderPage(); }
    }

    // Allow Enter key on key screen
    document.getElementById("key-input").addEventListener("keydown", e => {
      if (e.key === "Enter") verifyKey();
    });
  </script>
</body>

</html>
